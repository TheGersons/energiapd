<div class="space-y-5">
  <div class="w-full flex justify-between items-center">
    <div>
      <div class="flex items-center gap-2">
        <button
          (click)="goBack()"
          class="p-0 rounded-full h-6 w-6 hover:bg-gray-200 rounded-full cursor-pointer">
          <app-loader [name]="'arrow-left'" hostClass="w-6 h-6"></app-loader>
        </button>
        <h2 class="text-2xl font-bold">Creación / Edición de Departamentos</h2>
      </div>
      <h3 class="text-gray-500">Gestión de Departamentos</h3>
    </div>
  </div>

  <div class="space-y-4">
    <form
      novalidate
      autocomplete="off"
      (submit)="isEditMode() ? onUpdate($event) : onCreate($event)"
      class="p-4 rounded-md shadow-md border border-blue-200 bg-white grid grid-cols-1 gap-4">
      <div class="flex flex-col space-y-2">
        <label class="font-semibold" for="name">Nombre del departamento:</label>
        <input
          [formField]="departmentForm.departmentName"
          id="name"
          type="text"
          placeholder="Nombre del departamento"
          class="w-[50%] p-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500 placeholder:text-gray-500" />
        @if (isFieldInvalid("departmentName")) {
          <p class="text-sm text-red-400 font-medium flex items-center gap-1">
            @for (a of departmentForm.departmentName().errors(); track $index) {
              <app-loader
                name="warning"
                hostClass="w-3 h-3 text-red-400"></app-loader>
              <span>{{ a.message }}</span>
            }
          </p>
        }
      </div>

      <div
        class="flex items-center justify-end border-t border-gray-300 p-4 space-x-5">
        <button
          (click)="goBack()"
          type="button"
          class="bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-400">
          Cancelar
        </button>
        <button
          type="submit"
          class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-500">
          Guardar
        </button>
      </div>
    </form>
  </div>
</div>
