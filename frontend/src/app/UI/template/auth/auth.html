<div
  class="min-h-screen bg-slate-100 flex items-center justify-center px-4 py-12">
  <!-- Card -->
  <div class="w-full max-w-[400px]">
    <!-- Brand -->
    <div class="text-center mb-8">
      <div
        class="w-14 h-14 bg-slate-900 rounded-2xl inline-flex items-center justify-center mb-4 shadow-lg">
        <svg
          class="w-7 h-7 text-white"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.6"
            d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
        </svg>
      </div>
      <h1 class="text-xl font-bold text-slate-800">Panel de Administración</h1>
      <p class="text-slate-500 text-sm mt-1">
        Ingresa tus credenciales para continuar
      </p>
    </div>

    <!-- Form card -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
      <form
        (submit)="onSubmit($event)"
        novalidate
        autocomplete="off"
        class="space-y-5">
        <!-- Usuario -->
        <div class="space-y-1.5">
          <label for="user" class="block text-sm font-semibold text-slate-700">
            Usuario
          </label>
          <input
            [formField]="authForm.login"
            id="user"
            type="text"
            placeholder="tu.usuario"
            class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none focus:bg-white focus:border-slate-400 focus:ring-2 focus:ring-slate-900/10 transition-all" />
        </div>

        <!-- Contraseña -->
        <div class="space-y-1.5">
          <label
            for="password"
            class="block text-sm font-semibold text-slate-700">
            Contraseña
          </label>
          <input
            [formField]="authForm.password"
            id="password"
            type="password"
            placeholder="••••••••"
            class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none focus:bg-white focus:border-slate-400 focus:ring-2 focus:ring-slate-900/10 transition-all" />
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="isLoading()"
          class="w-full flex items-center justify-center gap-2 py-2.5 px-4 mt-1 bg-slate-900 hover:bg-slate-800 active:bg-slate-950 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-semibold text-sm rounded-xl transition-colors focus:outline-none focus:ring-2 focus:ring-slate-900 focus:ring-offset-2">
          @if (isLoading()) {
            <svg
              class="animate-spin h-4 w-4 text-white/70"
              fill="none"
              viewBox="0 0 24 24">
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
            </svg>
            Autenticando...
          } @else {
            Iniciar sesión
          }
        </button>
      </form>
    </div>

    <!-- Public loan link -->
    <div class="text-center mt-5">
      <p class="text-xs text-slate-400">
        ¿Necesitas solicitar un préstamo de herramientas?
        <a
          routerLink="/prestamo-herramientas/crear"
          class="text-slate-600 hover:text-slate-900 font-semibold underline underline-offset-2 ml-1 transition-colors">
          Solicitar aquí
        </a>
      </p>
    </div>
  </div>
</div>
