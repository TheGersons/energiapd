<div
  class="min-h-screen bg-slate-100 flex items-center justify-center px-4 py-12">
  <!-- Card -->
  <div class="w-full max-w-[400px]">
    <!-- Brand -->
    <div class="text-center mb-8">
      <div
        class="w-14 h-14 bg-slate-900 rounded-2xl inline-flex items-center justify-center mb-4 shadow-lg">
        <app-loader name="epd" hostClass="w-7 h-7"></app-loader>
      </div>
      <h1 class="text-xl font-bold text-slate-800">Energía PD</h1>
      <p class="text-slate-500 text-sm mt-1">
        Ingresa tus credenciales para continuar
      </p>
    </div>

    <!-- Form card -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
      <form
        (submit)="onSubmit($event)"
        novalidate
        autocomplete="off"
        class="space-y-5">
        <!-- Usuario -->
        <div class="space-y-1.5">
          <label for="user" class="block text-sm font-semibold text-slate-700">
            Usuario
          </label>
          <input
            [formField]="authForm.login"
            id="user"
            type="text"
            placeholder="tu.usuario"
            class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none focus:bg-white focus:border-slate-400 focus:ring-2 focus:ring-slate-900/10 transition-all" />
        </div>

        <!-- Contraseña -->
        <div class="space-y-1.5">
          <label
            for="password"
            class="block text-sm font-semibold text-slate-700">
            Contraseña
          </label>
          <div class="relative">
            <input
              [type]="showNewPassword() ? 'text' : 'password'"
              [formField]="authForm.password"
              placeholder="••••••••"
              class="w-full px-4 py-2.5 pr-10 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none focus:bg-white focus:border-amber-400 focus:ring-2 focus:ring-amber-400/20 transition-all" />
            <button
              type="button"
              (click)="showNewPassword.set(!showNewPassword())"
              class="absolute inset-y-0 right-3 flex items-center text-slate-400 hover:text-slate-600"
              tabindex="-1">
              <svg
                class="w-4 h-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor">
                @if (showNewPassword()) {
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                } @else {
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                }
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="isLoading()"
          class="w-full flex items-center justify-center gap-2 py-2.5 px-4 mt-1 bg-slate-900 hover:bg-slate-800 active:bg-slate-950 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-semibold text-sm rounded-xl transition-colors focus:outline-none focus:ring-2 focus:ring-slate-900 focus:ring-offset-2">
          @if (isLoading()) {
            <svg
              class="animate-spin h-4 w-4 text-white/70"
              fill="none"
              viewBox="0 0 24 24">
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
            </svg>
            Autenticando...
          } @else {
            Iniciar sesión
          }
        </button>
      </form>
    </div>

    <div class="text-center mt-5">
      <p class="text-xs text-slate-400">
        <a
          routerLink="/olvide-contraseña"
          class="text-slate-600 hover:text-slate-900 font-semibold underline underline-offset-2 ml-1 transition-colors">
          Olvidé la contraseña
        </a>
      </p>
    </div>
  </div>
</div>
