<aside
  (click)="$event.stopPropagation()"
  class="sticky top-0 z-10 h-[calc(100vh-1rem)] rounded-3xl overflow-hidden border border-gray-300">
  <div class="bg-gray-50 flex h-full p-2 text-white rounded-2xl">
    <div
      class="w-15 flex flex-col items-center h-full p-4 text-white rounded-2xl bg-gray-950">
      <button
        class="mb-4 p-2 flex items-center justify-center hover:bg-gray-800 rounded cursor-pointer">
        <svg
          viewBox="0 0 1024 1024"
          class="text-white w-6 h-6"
          version="1.1"
          xmlns="http://www.w3.org/2000/svg"
          fill="currentColor">
          <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
          <g
            id="SVGRepo_tracerCarrier"
            stroke-linecap="round"
            stroke-linejoin="round"></g>
          <g id="SVGRepo_iconCarrier">
            <path
              d="M109.632 673.664h519.68c25.152 0 45.568-22.016 45.568-48.896 0-26.88-20.416-48.896-45.568-48.896h-519.68c-25.216 0-45.632 22.016-45.632 48.896 0 26.88 20.48 48.896 45.632 48.896z m0-228.096h519.68c25.152 0 45.568-21.952 45.568-48.896 0-26.88-20.416-48.896-45.568-48.896h-519.68c-25.216 0-45.632 22.016-45.632 48.896 0 26.88 20.48 48.896 45.632 48.896z m3.264-219.904h795.776c26.88 0 50.56-20.352 51.328-47.168A48.896 48.896 0 0 0 911.104 128H115.328c-26.88 0-50.56 20.416-51.328 47.168a48.896 48.896 0 0 0 48.896 50.56z m619.776 447.232V348.672L960 510.784l-227.328 162.112c0 0.768 0 0.768 0 0z m178.432 122.944H115.328c-26.88 0-50.56 20.48-51.328 47.232a48.896 48.896 0 0 0 48.896 50.496h795.776c26.88 0 50.56-20.416 51.328-47.232a48.896 48.896 0 0 0-48.896-50.496z"
              fill="currentColor"></path>
          </g>
        </svg>
      </button>
      @for (m of modules; track $index) {
        <button
          *hasPermission="m.permissions ?? []"
          (click)="onClickModule(m)"
          class="p-2 flex items-center justify-center hover:bg-gray-800 rounded cursor-pointer">
          <app-loader [name]="m.moduleName" hostClass="w-6 h-6"></app-loader>
        </button>
      }
    </div>

    <div
      [ngClass]="toggleSidebar() ? 'w-64 p-4' : 'w-0 p-4 overflow-hidden'"
      class="flex flex-col items-stretch justify-start transition-all duration-300 text-gray-800 text-xl">
      <h5 class="font-bold truncate tracking-wider">Componentes</h5>

      <ul class="flex flex-col space-y-2 mt-4">
        @for (p of pages(); track $index) {
          <li class="font-medium">
            <a
              [routerLink]="p.pageUrl"
              routerLinkActive="bg-blue-700 text-white shadow-md"
              class="block w-full whitespace-nowrap p-2 rounded-md transition-all duration-200 hover:bg-white hover:shadow-lg hover:text-blue-700">
              {{ p.pageLabel }}
            </a>
          </li>
        }
      </ul>
    </div>
  </div>
</aside>
