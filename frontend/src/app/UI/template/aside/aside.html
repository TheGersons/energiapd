<aside
  (click)="$event.stopPropagation()"
  class="sticky top-0 z-10 h-[calc(100vh-1rem)] flex">

  <!-- ── Columna de íconos (siempre visible) ──────────────────
       Ancho fijo w-16 = 64px, coincide con el w-16 del main
       cuando el panel está colapsado.
       overflow-visible para que los tooltips no se corten.     -->
  <div class="flex flex-col items-center bg-gray-900 w-16 py-4 gap-1
              flex-shrink-0 rounded-2xl shadow-lg overflow-visible
              border border-gray-700/50">

    <!-- Logo -->
    <div class="mb-3">
      <div class="w-9 h-9 flex items-center justify-center">
        <app-loader name="epd" hostClass="w-9 h-9"></app-loader>
      </div>
    </div>

    <!-- Separador -->
    <div class="w-7 h-px bg-gray-700/80 mb-1"></div>

    <!-- Módulos -->
    @for (m of modules; track m.moduleId) {
      <button
        *hasPermission="m.permissions ?? []"
        (click)="onClickModule(m)"
        [class]="'relative w-10 h-10 flex items-center justify-center rounded-xl
                  transition-all duration-200 group/btn ' +
          (sModule().has(m.moduleId ?? '')
            ? 'bg-blue-600 shadow-lg shadow-blue-900/50'
            : 'hover:bg-gray-800')">

        <!-- Barra activa izquierda -->
        @if (sModule().has(m.moduleId ?? '')) {
          <span class="absolute -left-2 top-1/2 -translate-y-1/2
                       w-1 h-6 bg-blue-400 rounded-r-full"></span>
        }

        <app-loader
          [name]="m.moduleName"
          [hostClass]="'w-5 h-5 transition-colors duration-150 ' +
            (sModule().has(m.moduleId ?? '')
              ? 'text-white'
              : 'text-gray-400 group-hover/btn:text-white')">
        </app-loader>

        <!-- Tooltip — z-[100] para salir del stacking context -->
        <span class="pointer-events-none absolute left-[calc(100%+0.75rem)] top-1/2
                     -translate-y-1/2 z-[100] whitespace-nowrap
                     rounded-lg border border-gray-700 bg-gray-900 px-2.5 py-1.5
                     text-xs font-medium text-white shadow-xl
                     opacity-0 scale-95
                     group-hover/btn:opacity-100 group-hover/btn:scale-100
                     transition-all duration-150">
          {{ m.moduleLabel }}
          <!-- Flecha -->
          <span class="absolute right-full top-1/2 -translate-y-1/2
                       border-[5px] border-transparent border-r-gray-900"></span>
        </span>

      </button>
    }

    <!-- Empuja los items siguientes al fondo -->
    <div class="flex-1"></div>
    <div class="w-7 h-px bg-gray-700/80 mb-1"></div>

    <!-- Botón de configuración -->
    <button
      class="relative w-10 h-10 flex items-center justify-center rounded-xl
             transition-all duration-200 group/btn hover:bg-gray-800">
      <app-loader name="settings"
        hostClass="w-5 h-5 text-gray-500 group-hover/btn:text-gray-200 transition-colors">
      </app-loader>
      <span class="pointer-events-none absolute left-[calc(100%+0.75rem)] top-1/2
                   -translate-y-1/2 z-[100] whitespace-nowrap
                   rounded-lg border border-gray-700 bg-gray-900 px-2.5 py-1.5
                   text-xs font-medium text-white shadow-xl
                   opacity-0 scale-95
                   group-hover/btn:opacity-100 group-hover/btn:scale-100
                   transition-all duration-150">
        Configuraciones
        <span class="absolute right-full top-1/2 -translate-y-1/2
                     border-[5px] border-transparent border-r-gray-900"></span>
      </span>
    </button>

  </div>

  <!-- ── Panel de páginas (colapsable) ────────────────────────
       Se anima por width. overflow-hidden aquí está bien
       porque el panel no tiene tooltips.                       -->
  <div
    [class]="'flex flex-col bg-gray-50 border border-gray-200 rounded-2xl
              shadow-lg ml-2 overflow-hidden transition-[width,opacity] duration-300 ' +
             (toggleSidebar() ? 'w-48 opacity-100' : 'w-0 opacity-0 border-0')">

    <!-- Etiqueta del módulo activo -->
    <div class="flex-shrink-0 px-4 pt-5 pb-2">
      <p class="text-[10px] font-bold uppercase tracking-[.15em] text-gray-400 truncate">
        {{ currentModuleLabel() }}
      </p>
    </div>

    <!-- Nav links -->
    <nav class="flex-1 overflow-y-auto overflow-x-hidden px-2 pb-4 space-y-0.5">
      @for (p of pages(); track p.pageId) {
        <a
          [routerLink]="p.pageUrl"
          routerLinkActive #rla="routerLinkActive"
          [routerLinkActiveOptions]="{ exact: false }"
          [class]="'flex items-center w-full px-3 py-2 rounded-lg text-sm font-medium
                    transition-all duration-150 truncate ' +
                   (rla.isActive
                     ? 'bg-blue-600 text-white shadow-sm'
                     : 'text-gray-600 hover:bg-gray-200 hover:text-gray-900')">
          <span class="truncate">{{ p.pageLabel }}</span>
        </a>
      }
    </nav>

  </div>

</aside>
