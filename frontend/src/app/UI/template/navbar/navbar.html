<nav
  class="px-5 py-3 bg-white sticky border border-gray-200 top-0 z-10 flex items-center justify-between rounded-2xl shadow-sm">
  <!-- Lado izquierdo: hamburger + breadcrumb area -->
  <button
    (click)="onToggleSidebar()"
    class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100 hover:text-gray-800 transition-colors cursor-pointer flex-shrink-0">
    <app-loader
      name="hamburger"
      [hostClass]="
        'w-5 h-5 transition-all duration-300 ' +
        (sidebar() ? 'text-blue-600' : '')
      ">
    </app-loader>
  </button>

  <!-- Lado derecho: utilidades -->
  <div class="flex items-center gap-1">
    <!-- Búsqueda -->
    <div class="relative hidden sm:block">
      <svg
        class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
      <input
        type="search"
        placeholder="Buscar..."
        class="pl-8 pr-3 py-1.5 text-sm border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white placeholder:text-gray-400 w-44 transition-all focus:w-56" />
    </div>

    <!-- Separador -->
    <div class="w-px h-5 bg-gray-200 mx-1 hidden sm:block"></div>

    <!-- Notificaciones -->
    <button
      class="relative w-8 h-8 flex items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100 hover:text-gray-800 transition-colors">
      <app-loader name="bell" hostClass="w-5 h-5"></app-loader>
      <!-- Badge de notificaciones (mostrar condicionalmente) -->
      <span
        class="absolute top-1.5 right-1.5 w-1.5 h-1.5 bg-red-500 rounded-full"></span>
    </button>

    <!-- Perfil de usuario -->
    <button
      class="flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-gray-100 transition-colors group">
      <div
        class="w-7 h-7 rounded-full bg-blue-600 flex items-center justify-center flex-shrink-0">
        <span class="text-xs font-bold text-white">U</span>
      </div>
    </button>

    <!-- Separador -->
    <div class="w-px h-5 bg-gray-200 mx-1"></div>

    <!-- Cerrar sesión -->
    <button
      (click)="onLogout()"
      class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:bg-red-50 hover:text-red-600 transition-colors cursor-pointer"
      title="Cerrar sesión">
      <app-loader name="logout" hostClass="w-5 h-5"></app-loader>
    </button>
  </div>
</nav>
