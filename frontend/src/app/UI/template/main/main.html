<div class="antialiased min-h-screen bg-gray-100">
  <div
    (click)="onToggleSidebar()"
    [class]="
      'fixed inset-0 z-40 bg-black/50 backdrop-blur-sm transition-opacity duration-300 lg:hidden ' +
      (toggleSidebar()
        ? 'opacity-100 pointer-events-auto'
        : 'opacity-0 pointer-events-none')
    "></div>

  <div class="flex gap-2 p-2 min-h-screen">
    <app-aside
      [toggleSidebar]="toggleSidebar"
      class="transition-[width,transform] duration-300 ease-in-out flex-shrink-0 lg:sticky lg:top-0 lg:h-[calc(100vh-1rem)] max-lg:fixed max-lg:top-2 max-lg:bottom-2 max-lg:left-2 max-lg:z-50"
      [ngClass]="{
        'lg:w-[16.5rem]  max-lg:translate-x-0': toggleSidebar(),
        'lg:w-16         max-lg:-translate-x-[calc(100%+0.5rem)]':
          !toggleSidebar(),
      }" />

    <!-- Contenido principal -->
    <div class="flex-1 flex flex-col gap-2 min-w-0">
      <app-navbar (toggleSidebar)="onToggleSidebar()" />
      <main class="flex-1 bg-transparent px-5 py-4">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
</div>
