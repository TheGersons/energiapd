<div class="antialiased min-h-screen bg-gray-100">
  <div class="flex gap-2 p-2 min-h-screen">
    <!-- Aside -->
    <app-aside
      [ngClass]="toggleSidebar() ? 'w-[16.5rem]' : 'w-16'"
      [toggleSidebar]="toggleSidebar"
      class="transition-[width] duration-300 flex-shrink-0" />

    <!-- Contenido principal -->
    <div class="flex-1 flex flex-col gap-2 min-w-0">
      <app-navbar (toggleSidebar)="onToggleSidebar()" />
      <main class="flex-1 bg-transparent px-4 py-4">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
</div>
