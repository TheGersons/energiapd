server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.csr.html;

    # 1. HTML (CSR shell + prerenders): nunca cachear, asi el navegador
    #    siempre pide fresco el shell y recibe los nuevos hashes de JS/CSS.
    location = /index.csr.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location ~ /index\.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 2. Assets con hash en el nombre (JS, CSS, fuentes, imagenes):
    #    cache de 1 anio; si el contenido cambia, el hash cambia y el
    #    navegador descarga el archivo nuevo automaticamente.
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # 3. Reverse proxy hacia la API: el navegador pega a /api/... en el
    #    mismo host/puerto del frontend, nginx lo reenvia al contenedor
    #    interno (api:3001). El puerto del backend no se expone al publico.
    location /api/ {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Socket.IO: upgrade a WebSocket mediante el mismo proxy.
    location /socket.io/ {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # 5. Rutas de Angular (SPA): si no encuentra archivo o prerender,
    #    carga index.csr.html y Angular hace la navegacion cliente.
    location / {
        try_files $uri $uri/index.html /index.csr.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    error_page 404 /index.csr.html;
}
